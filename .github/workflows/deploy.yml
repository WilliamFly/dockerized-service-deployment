name: Build, Push, and Deploy Dockerized Service

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/williamfly/dockerized-service-deployment

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to remote server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            docker pull ${{ env.IMAGE_NAME }}:latest
            docker stop dockerized-app || true
            docker rm dockerized-app || true
            docker run -d \
              -p 80:80 \
              -e SECRET_MESSAGE="${{ secrets.SECRET_MESSAGE }}" \
              -e USERNAME="${{ secrets.APP_USERNAME }}" \
              -e PASSWORD="${{ secrets.APP_PASSWORD }}" \
              -e PORT=80 \
              --name dockerized-app \
              --restart unless-stopped \
              ${{ env.IMAGE_NAME }}:latest
